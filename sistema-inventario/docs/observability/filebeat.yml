filebeat.inputs:
  - type: filestream
    id: clothwise-springboot
    enabled: true
    paths:
      - /var/log/clothwise/backend.log
    fields:
      service: springboot
      app: clothwise
    fields_under_root: false

  - type: filestream
    id: nginx-access
    enabled: true
    paths:
      - /var/log/nginx/access.log
    fields:
      service: nginx-access
      app: clothwise
    fields_under_root: false

  - type: filestream
    id: nginx-error
    enabled: true
    paths:
      - /var/log/nginx/error.log
    fields:
      service: nginx-error
      app: clothwise
    fields_under_root: false

  - type: filestream
    id: mysql-error
    enabled: true
    paths:
      - /var/log/mysql/error.log
    fields:
      service: mysql-error
      app: clothwise
    fields_under_root: false

output.elasticsearch:
  enabled: false

output.logstash:
  hosts: ["127.0.0.1:5044"]

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
