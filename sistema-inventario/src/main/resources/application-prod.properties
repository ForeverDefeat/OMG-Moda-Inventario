# ================================================================
# ClothWise - perfil produccion
# ================================================================

server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.pool-name=ClothWise-Prod-Pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET}
jwt.expiracion-horas=${JWT_EXPIRACION_HORAS:8}

spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=${APP_TIME_ZONE:America/Lima}

logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.omgmoda=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://*.omgmoda.com}

clothwise.uploads.productos-dir=${PRODUCTOS_UPLOAD_DIR:uploads/productos}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
clothwise.seed.enabled=false
clothwise.compras.proveedor-default=${COMPRAS_PROVEEDOR_DEFAULT:Proveedor pendiente}
